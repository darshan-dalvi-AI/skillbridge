<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SkillBridge PDF reader</title>
<style>
  :root{ color-scheme: dark light; }
  html,body{ margin:0; padding:0; background:transparent; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  .wrap{ padding:2px; }
  .btn{
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; box-sizing:border-box; padding:15px 12px;
    background:#0d1b2a; color:#e6eef8; border:1.6px dashed #2b6f86;
    border-radius:12px; font-size:15px; font-weight:600; cursor:pointer;
    text-align:center; transition:border-color .15s, background .15s; user-select:none;
  }
  .btn:hover{ border-color:#00d3ea; background:#10233a; }
  .btn:active{ transform:translateY(1px); }
  .status{ margin-top:8px; font-size:12.5px; color:#9fb3c8; line-height:1.45; }
  .ok{ color:#00d39a; } .err{ color:#ff6b85; }
  input[type=file]{ position:absolute; width:1px; height:1px; opacity:0; pointer-events:none; }
</style>
</head>
<body>
<div class="wrap">
  <label class="btn" id="lbl" for="file">
    <span id="ic">📄</span><span id="tx">Choose your resume PDF</span>
  </label>
  <input id="file" type="file" accept="application/pdf,.pdf">
  <div class="status" id="st">Read on your device — nothing is uploaded, so it works on phones too.</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
(function(){
  function post(m){ window.parent.postMessage(Object.assign({isStreamlitMessage:true}, m), "*"); }
  function ready(){ post({type:"streamlit:componentReady", apiVersion:1}); }
  function setH(){ post({type:"streamlit:setFrameHeight", height: Math.ceil(document.documentElement.scrollHeight) + 4}); }
  function setVal(v){ post({type:"streamlit:setComponentValue", value:v, dataType:"json"}); }

  var fileEl=document.getElementById("file");
  var ic=document.getElementById("ic"), tx=document.getElementById("tx"), stt=document.getElementById("st");

  window.addEventListener("message", function(e){
    if(e.data && e.data.type==="streamlit:render"){ setH(); }
  });

  var ok = (typeof pdfjsLib !== "undefined");
  if(ok){
    pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  } else {
    stt.className="status err";
    stt.textContent="Couldn't load the PDF reader here. Use “Paste Resume Text” instead.";
  }

  fileEl.addEventListener("change", async function(ev){
    var f = ev.target.files && ev.target.files[0];
    if(!f) return;
    ic.textContent="⏳"; tx.textContent="Reading "+f.name+" …";
    stt.className="status"; stt.textContent="Working entirely on your device…"; setH();
    try{
      if(!ok) throw new Error("reader not loaded");
      var buf = await f.arrayBuffer();
      var pdf = await pdfjsLib.getDocument({data:buf}).promise;
      var text="";
      for(var i=1;i<=pdf.numPages;i++){
        var page = await pdf.getPage(i);
        var c = await page.getTextContent();
        text += c.items.map(function(it){ return it.str; }).join(" ") + "\n";
      }
      text = text.trim();
      if(text.length < 10){
        stt.className="status err";
        stt.textContent="This PDF has little selectable text (maybe a scan/image). Try “Paste Resume Text”.";
        ic.textContent="📄"; tx.textContent="Choose your resume PDF"; setH(); return;
      }
      setVal(text);
      ic.textContent="✅"; tx.textContent=f.name+" — read";
      stt.className="status ok";
      stt.textContent="Extracted "+text.length+" characters on your device (no upload). Analyzing…";
      setH();
    }catch(err){
      stt.className="status err";
      stt.textContent="Couldn’t read this PDF ("+((err&&err.message)||"error")+"). Try “Paste Resume Text”.";
      ic.textContent="📄"; tx.textContent="Choose your resume PDF"; setH();
    }
  });

  ready(); setH();
  window.addEventListener("load", setH);
})();
</script>
</body>
</html>
